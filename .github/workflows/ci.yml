name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Matches the supported runtime declared in package.json "engines".
          # Bump once the build toolchain (webpack/babel) is modernized.
          node-version: '16'
      - run: npm install
      - run: npm run lint
      - run: npm test
