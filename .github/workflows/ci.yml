name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Matches the supported runtime declared in package.json "engines".
          # Bump once the build toolchain (webpack/babel) is modernized.
          node-version: '16'
      - run: npm install
      - run: npm run lint
      - run: npm run test:unit
      # Integration tests spin up a WAX chain via qtest-js (Docker). Pre-pull the
      # chain image (~1.7 GB) in its own step so the download isn't counted
      # against the tests' mocha timeout on a cold runner — the cause of earlier
      # CI failures. If anonymous Docker Hub pulls get rate-limited, add a
      # docker/login-action step using repo secrets before this.
      - name: Pre-pull qtest chain image
        run: docker pull songmai108/qtest:v4.0.4
      - run: npm run test:integration
